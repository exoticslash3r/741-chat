<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>9141 Division</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:black; color:white; font-family:Arial,sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
.screen { display:none; flex-direction:column; width:100%; max-width:900px; padding:20px; border:2px solid white; border-radius:10px; }
.screen.active { display:flex; }
h1 { text-align:center; margin-bottom:20px; }
input, button { width:100%; padding:12px; margin-bottom:10px; border:1px solid white; border-radius:6px; background:black; color:white; font-size:16px; }
button:hover { background:white; color:black; cursor:pointer; }
#messages { height:400px; overflow-y:auto; border:1px solid white; border-radius:6px; padding:10px; margin-bottom:10px; }
.msg { margin-bottom:6px; }
.google-btn { background:white; color:black; font-weight:bold; }
.google-btn:hover { background:#4285f4; color:white; }
#userInfo { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
#logoutBtn { width:auto; padding:5px 10px; margin:0; }
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
<h1>9141 Division</h1>
<button id="googleSignIn" class="google-btn">Sign in with Google</button>
</div>

<div id="chatScreen" class="screen">
<h1>9141 Division</h1>
<div id="userInfo">
<span id="displayName"></span>
<button id="logoutBtn">Logout</button>
</div>
<div id="messages"></div>
<input id="msgInput" placeholder="Message">
<button id="sendBtn">SEND</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyCwwwuyCHElQHEPFp4aDAilazkZkpJSgwk",
authDomain:"chat-8bef7.firebaseapp.com",
projectId:"chat-8bef7",
storageBucket:"chat-8bef7.firebasestorage.app",
messagingSenderId:"493990140970",
appId:"1:493990140970:web:ea0e478103932b1bbd7753"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const loginScreen = document.getElementById("loginScreen");
const chatScreen = document.getElementById("chatScreen");
const messagesBox = document.getElementById("messages");
const googleSignIn = document.getElementById("googleSignIn");
const sendBtn = document.getElementById("sendBtn");
const logoutBtn = document.getElementById("logoutBtn");
const msgInput = document.getElementById("msgInput");
const displayName = document.getElementById("displayName");

const messagesCol = collection(db, "messages");
const q = query(messagesCol, orderBy("timestamp"));

function showScreen(screen) {
loginScreen.classList.remove("active");
chatScreen.classList.remove("active");
screen.classList.add("active");
}

onSnapshot(q, snap => {
messagesBox.innerHTML = "";
snap.forEach(d => {
const m = d.data();
messagesBox.innerHTML += `<div class="msg"><b>${m.user}:</b> ${m.text}</div>`;
});
messagesBox.scrollTop = messagesBox.scrollHeight;
});

onAuthStateChanged(auth, user => {
if (user) {
displayName.textContent = user.displayName;
showScreen(chatScreen);
} else {
showScreen(loginScreen);
}
});

googleSignIn.onclick = () => {
signInWithPopup(auth, provider)
.catch(error => alert(error.message));
};

logoutBtn.onclick = () => {
signOut(auth);
};

sendBtn.onclick = async () => {
if (!auth.currentUser) return;
const text = msgInput.value.trim();
if (!text) return;
await addDoc(messagesCol, {
user: auth.currentUser.displayName,
text: text,
timestamp: serverTimestamp()
});
msgInput.value = "";
};
</script>
</body>
</html>
